<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Iniciar sesión')}"></head>

<body>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="login-brand">
                <div class="login-icon">⬡</div>
                <div class="login-title">AppAdmin</div>
                <div class="login-subtitle">Inicia sesión para continuar</div>
            </div>

            <div th:if="${param.error}" class="alert alert-error">
                ✕ &nbsp;Usuario o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                ✓ &nbsp;Sesión cerrada correctamente.
            </div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="form-group">
                    <label class="form-label" for="username">Usuario</label>
                    <input class="form-control" type="text" id="username" name="username" placeholder="tu usuario"
                        required autofocus />
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input class="form-control" type="password" id="password" name="password" placeholder="••••••••"
                        required />
                </div>

                <button type="submit" class="btn-primary">Iniciar sesión</button>
            </form>

        </div>
    </div>

</body>

</html>
